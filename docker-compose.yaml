version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: user-ms-postgres
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d user_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - user-network

  user-ms:
    build: .
    container_name: user-ms
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: user_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-secret-key-in-production-it-must-be-at-least-32-characters-long
      JWT_ACCESS_EXPIRY: 60
      JWT_REFRESH_EXPIRY: 1440
      JWT_ISSUER: http://localhost:8081
      JWT_AUDIENCE: deal-ms
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    networks:
      - user-network

networks:
  user-network:
    driver: bridge

volumes:
  postgres_data:
