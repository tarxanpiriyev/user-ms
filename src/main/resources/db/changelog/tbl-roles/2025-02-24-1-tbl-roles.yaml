databaseChangeLog:
  - changeSet:
      id: 2
      author: tarxan.piriyev
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
                  autoIncrement: true
                  incrementBy: 1
              - column:
                  name: name
                  type: varchar(25)
                  constraints:
                    nullable: false
                    unique: true
