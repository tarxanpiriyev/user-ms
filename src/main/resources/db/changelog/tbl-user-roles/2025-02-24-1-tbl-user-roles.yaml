databaseChangeLog:
  - changeSet:
      id: 3
      author: tarxan.piriyev
      changes:
        - createTable:
            tableName: user_roles
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
                  autoIncrement: true
                  incrementBy: 1
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: bigint
                  constraints:
                    nullable: false
              - addForeignKeyConstraint:
                  baseTableName: user_roles
                  baseColumnNames: user_id
                  referencedTableName: users
                  referencedColumnNames: id
                  constraintName: fk_user_roles_user
              - addForeignKeyConstraint:
                  baseTableName: user_roles
                  baseColumnNames: role_id
                  referencedTableName: roles
                  referencedColumnNames: id
                  constraintName: fk_user_roles_role
