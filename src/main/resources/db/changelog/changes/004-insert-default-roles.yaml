databaseChangeLog:
  - changeSet:
      id: 004-insert-default-roles
      author: system
      changes:
        - insert:
            tableName: roles
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: name
                  value: USER
              - column:
                  name: description
                  value: Regular user role with basic permissions
              - column:
                  name: created_at
                  valueDate: now()
              - column:
                  name: updated_at
                  valueDate: now()
        - insert:
            tableName: roles
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: name
                  value: ADMIN
              - column:
                  name: description
                  value: Administrator role with full permissions
              - column:
                  name: created_at
                  valueDate: now()
              - column:
                  name: updated_at
                  valueDate: now()
