server:
  servlet:
    context-path: /api/v1/user-ms
  port: 8080

spring:
  security:
    secret: jwt-secret-private-key
    accessToken-expires-in-minute: 10
    refreshToken-expires-in-minute: 20
  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    database: postgresql
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true