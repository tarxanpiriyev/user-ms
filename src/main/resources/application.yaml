server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: user-ms
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:user_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: ${SHOW_SQL:false}
    open-in-view: false
    database: postgresql
    properties:
      hibernate:
        format_sql: true
  
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true

  web:
    error:
      include-message: always
      include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:change-this-secret-key-in-production-it-must-be-at-least-32-characters-long}
  access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY:60}
  refresh-token-expiry-minutes: ${JWT_REFRESH_EXPIRY:1440}
  issuer: ${JWT_ISSUER:http://localhost:8081}
  audience: ${JWT_AUDIENCE:deal-ms}

# Logging
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    az.user_ms: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:DEBUG}

# Spring Doc - OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true